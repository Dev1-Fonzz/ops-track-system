<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsTrack Live</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        #map { height: 300px; width: 100%; border-radius: 0.5rem; z-index: 1; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Navbar Pilihan Mode -->
    <nav class="bg-blue-600 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="font-bold text-lg">🚀 OpsTrack</h1>
            <div class="space-x-2">
                <button onclick="switchMode('driver')" id="btn-driver" class="px-3 py-1 bg-white text-blue-600 rounded font-bold text-sm">Driver</button>
                <button onclick="switchMode('operator')" id="btn-operator" class="px-3 py-1 bg-blue-800 text-white rounded font-bold text-sm">Operator</button>
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">

        <!-- ================= DRIVER VIEW ================= -->
        <div id="view-driver" class="hidden-section">
            <div class="bg-white p-6 rounded-xl shadow-md text-center mt-4">
                <h2 class="text-xl font-bold text-gray-700 mb-2">Panel Pemandu</h2>
                <p class="text-sm text-gray-500 mb-4">Sistem sedang mengesan lokasi anda...</p>
                
                <div id="status-box" class="p-4 bg-gray-200 rounded-lg mb-4 transition-colors duration-300">
                    <p class="text-lg font-bold" id="driver-status">Menunggu GPS...</p>
                    <p class="text-2xl font-mono font-black mt-2" id="distance-display">0 m</p>
                </div>

                <div class="text-left text-xs text-gray-400 bg-gray-50 p-2 rounded">
                    <p>Destinasi: KLCC (Lat: 3.1579, Lng: 101.7116)</p>
                    <p>ID Misi: MISI-001</p>
                </div>
                
                <p class="mt-6 text-xs text-red-400 animate-pulse">⚠️ Jangan tutup tab ini semasa memandu.</p>            </div>
        </div>

        <!-- ================= OPERATOR VIEW ================= -->
        <div id="view-operator" class="hidden-section">
            <div class="bg-white p-4 rounded-xl shadow-md mt-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">Dashboard Operator</h2>
                    <span id="op-status-badge" class="px-2 py-1 bg-gray-300 text-xs rounded font-bold">LOADING</span>
                </div>

                <!-- Info Card -->
                <div class="grid grid-cols-2 gap-2 mb-4 text-sm">
                    <div class="bg-blue-50 p-2 rounded">
                        <span class="block text-xs text-gray-500">Pemandu</span>
                        <span class="font-bold" id="op-name">-</span>
                    </div>
                    <div class="bg-blue-50 p-2 rounded">
                        <span class="block text-xs text-gray-500">Plat</span>
                        <span class="font-bold" id="op-plate">-</span>
                    </div>
                    <div class="bg-green-50 p-2 rounded col-span-2">
                        <span class="block text-xs text-gray-500">Jarak Lagi</span>
                        <span class="font-mono text-lg font-bold text-green-700" id="op-distance">-</span>
                    </div>
                </div>

                <!-- Map -->
                <div id="map"></div>
                <p class="text-xs text-center text-gray-400 mt-2">Peta Live Real-time</p>
            </div>
            
            <!-- Log Console Simple -->
            <div class="mt-4 bg-black text-green-400 p-3 rounded text-xs font-mono h-32 overflow-y-auto" id="console-log">
                > System initialized...<br>
            </div>
        </div>

    </div>

    <!-- FIREBASE SDK (Modular via CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- KONFIGURASI ---
        const firebaseConfig = {
            apiKey: "AIzaSyABchyom-zF_ZWuV7HWiDLWBaopBQ1TYxk",
            authDomain: "ops-track-system.firebaseapp.com",            databaseURL: "https://ops-track-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ops-track-system",
            storageBucket: "ops-track-system.firebasestorage.app",
            messagingSenderId: "706189064777",
            appId: "1:706189064777:web:03f71ed77e5c3e1f265d98"
        };

        // Init Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const MISSION_ID = "MISI-001";
        
        // Destinasi (KLCC)
        const DEST_LAT = 3.1579;
        const DEST_LNG = 101.7116;
        const RADIUS_TIBA = 100; // meter

        let map, driverMarker, destMarker;
        let currentMode = 'driver'; // default

        // --- FUNGSI GLOBAL (Untuk Button) ---
        window.switchMode = (mode) => {
            currentMode = mode;
            document.getElementById('view-driver').style.display = mode === 'driver' ? 'block' : 'none';
            document.getElementById('view-operator').style.display = mode === 'operator' ? 'block' : 'none';
            
            // Update Button Style
            const btnD = document.getElementById('btn-driver');
            const btnO = document.getElementById('btn-operator');
            
            if(mode === 'driver') {
                btnD.className = "px-3 py-1 bg-white text-blue-600 rounded font-bold text-sm";
                btnO.className = "px-3 py-1 bg-blue-800 text-white rounded font-bold text-sm";
                initDriver();
            } else {
                btnO.className = "px-3 py-1 bg-white text-blue-600 rounded font-bold text-sm";
                btnD.className = "px-3 py-1 bg-blue-800 text-white rounded font-bold text-sm";
                initOperator();
            }
        };

        function log(msg) {
            const consoleDiv = document.getElementById('console-log');
            if(consoleDiv) consoleDiv.innerHTML += `> ${msg}<br>`;
        }

        // --- LOGIC DRIVER ---
        async function initDriver() {
            if(currentMode !== 'driver') return;            
            try {
                await signInAnonymously(auth);
                log("Driver logged in.");
            } catch(e) { console.error(e); }

            if (!navigator.geolocation) {
                document.getElementById('driver-status').innerText = "GPS Tidak Disokong!";
                return;
            }

            navigator.geolocation.watchPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                // Kira Jarak
                const dist = getDistanceFromLatLonInMeters(lat, lng, DEST_LAT, DEST_LNG);
                const roundedDist = Math.round(dist);

                // Update UI
                document.getElementById('distance-display').innerText = roundedDist + " m";
                
                let status = "in_transit";
                if (dist <= RADIUS_TIBA) {
                    status = "arrived";
                    document.getElementById('driver-status').innerText = "✅ TELAH SAMPAI!";
                    document.getElementById('status-box').className = "p-4 bg-green-500 text-white rounded-lg mb-4 transition-colors duration-300";
                    if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
                } else {
                    document.getElementById('driver-status').innerText = "🚛 Dalam Perjalanan";
                    document.getElementById('status-box').className = "p-4 bg-blue-500 text-white rounded-lg mb-4 transition-colors duration-300";
                }

                // Hantar ke Firebase
                const updates = {
                    [`missions/${MISSION_ID}/tracking/currentLat`]: lat,
                    [`missions/${MISSION_ID}/tracking/currentLng`]: lng,
                    [`missions/${MISSION_ID}/tracking/lastUpdated`]: Date.now(),
                    [`missions/${MISSION_ID}/status/current`]: status,
                    [`missions/${MISSION_ID}/status/distanceRemaining`]: roundedDist,
                    [`missions/${MISSION_ID}/info/driverName`]: "Pemandu Live", // Set nama default
                    [`missions/${MISSION_ID}/info/vehiclePlate`]: "ABC-1234",
                    [`missions/${MISSION_ID}/destination/name`]: "KLCC Tower",
                    [`missions/${MISSION_ID}/destination/targetLat`]: DEST_LAT,
                    [`missions/${MISSION_ID}/destination/targetLng`]: DEST_LNG,
                };
                if(status === 'arrived') {
                    updates[`missions/${MISSION_ID}/status/arrivedAt`] = new Date().toISOString();
                }
                await set(ref(db, `missions/${MISSION_ID}`), updates);
                log(`Data sent: ${roundedDist}m`);

            }, (err) => {
                document.getElementById('driver-status').innerText = "Error GPS: " + err.message;
            }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
        }

        // --- LOGIC OPERATOR ---
        function initOperator() {
            if(currentMode !== 'operator') return;

            // Init Map jika belum
            if (!map) {
                map = L.map('map').setView([3.1390, 101.6869], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                
                driverMarker = L.marker([3.1390, 101.6869]).addTo(map).bindPopup("Lokasi Driver");
                destMarker = L.marker([DEST_LAT, DEST_LNG]).addTo(map).bindPopup("Destinasi (KLCC)");
            }

            // Listen Realtime
            const missionRef = ref(db, `missions/${MISSION_ID}`);
            onValue(missionRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    log("Menunggu data...");
                    return;
                }

                // Update Info Card
                document.getElementById('op-name').innerText = data.info?.driverName || "Unknown";
                document.getElementById('op-plate').innerText = data.info?.vehiclePlate || "-";
                const dist = data.status?.distanceRemaining || "?";
                document.getElementById('op-distance').innerText = dist + " m";

                // Update Badge Status
                const badge = document.getElementById('op-status-badge');
                if (data.status?.current === 'arrived') {
                    badge.innerText = "SAMPAI ✅";
                    badge.className = "px-2 py-1 bg-green-500 text-white text-xs rounded font-bold";
                } else {
                    badge.innerText = "BERGERAK 🚛";
                    badge.className = "px-2 py-1 bg-blue-500 text-white text-xs rounded font-bold";
                }

                // Update Map
                const lat = data.tracking?.currentLat;                const lng = data.tracking?.currentLng;
                if (lat && lng) {
                    const newLatLng = new L.LatLng(lat, lng);
                    driverMarker.setLatLng(newLatLng);
                    map.panTo(newLatLng);
                    log(`Loc updated: ${lat}, ${lng}`);
                }
            });
        }

        // Helper: Haversine Formula
        function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
            var R = 6371e3; 
            var dLat = deg2rad(lat2-lat1);
            var dLon = deg2rad(lon2-lon1); 
            var a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * 
                Math.sin(dLon/2) * Math.sin(dLon/2); 
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            var d = R * c; 
            return d;
        }
        function deg2rad(deg) { return deg * (Math.PI/180); }

        // Auto start driver mode on load
        switchMode('driver');

    </script>
</body>
</html>
