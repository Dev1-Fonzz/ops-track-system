<!DOCTYPE html>
<html lang="ms" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="OpsTrack - Sistem Penjejakan Operator (Leaflet Version)" />
  <meta name="theme-color" content="#1a73e8" />
  <title>OpsTrack • Leaflet Edition</title>

  <!-- 🔐 Security Headers -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://www.gstatic.com https://unpkg.com;
    style-src 'self' 'unsafe-inline' https://unpkg.com;
    connect-src 'self' https://ops-track-system-default-rtdb.asia-southeast1.firebasedatabase.app https://*.tile.openstreetmap.org;
    img-src 'self' https: data:;
  ">

  <!-- 🗺️ LEAFLET CSS & JS (Ganti Mapbox) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Leaflet Locate Control (Untuk GPS Button) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.locatecontrol/0.79.0/L.Control.Locate.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.locatecontrol/0.79.0/L.Control.Locate.min.js"></script>

  <!-- ⚡ Firebase SDK -->
  <script type="module">
    // ========================================================================
    // 🔧 KONFIGURASI UTAMA
    // ========================================================================
    window.OpsTrackConfig = {
      firebase: {
        apiKey: "AIzaSyABchyom-zF_ZWuV7HWiDLWBaopBQ1TYxk",
        authDomain: "ops-track-system.firebaseapp.com",
        databaseURL: "https://ops-track-system-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ops-track-system",
        storageBucket: "ops-track-system.firebasestorage.app",
        messagingSenderId: "706189064777",
        appId: "1:706189064777:web:03f71ed77e5c3e1f265d98"
      },
      // Tiada perlu token untuk Leaflet!
      map: {
        defaultCenter: [3.1390, 101.6869], // KL
        defaultZoom: 11,
        tileLayer: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      },
      tracking: {
        adaptiveFrequency: { moving: 8000, stationary: 30000 },        accuracyThreshold: 50,
        offlineQueueLimit: 100,
        maxRoutePoints: 500
      },
      ui: {
        theme: "auto",
        language: "ms"
      }
    };

    // ========================================================================
    // 📦 IMPORT FIREBASE
    // ========================================================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, onDisconnect, push } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

    const app = initializeApp(OpsTrackConfig.firebase);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // ========================================================================
    // 🌐 GLOBAL STATE
    // ========================================================================
    window.OpsTrackState = {
      user: null,
      role: null,
      activeMission: null,
      operators: new Map(),
      map: null,
      markers: new Map(),
      polyline: null,
      watchId: null,
      isOnline: navigator.onLine,
      lastKnownPosition: null,
      trackingActive: false,
      offlineQueue: []
    };

    // ========================================================================
    // 🧩 CORE MODULES
    // ========================================================================
    const OpsTrack = {
      
      auth: {
        async init() {
          try {
            onAuthStateChanged(auth, async (user) => {
              OpsTrackState.user = user;
              if (user) {                const adminRef = ref(db, `admins/${user.uid}`);
                onValue(adminRef, (snapshot) => {
                  OpsTrackState.role = snapshot.exists() ? 'admin' : 'operator';
                  localStorage.setItem('opsTrackRole', OpsTrackState.role);
                  OpsTrack.ui.renderDashboard();
                  OpsTrack.data.startListeners();
                }, { onlyOnce: true });

                const presenceRef = ref(db, `operators/${user.uid}/isOnline`);
                onDisconnect(presenceRef).set(false);
                await update(ref(db, `operators/${user.uid}`), { isOnline: true, lastSeen: Date.now() });
                
                OpsTrack.ui.showDashboard();
                OpsTrack.ui.showToast('✅ Berjaya log masuk', 'success');
              } else {
                OpsTrack.ui.showLogin();
              }
            });
            if (!auth.currentUser) await signInAnonymously(auth);
          } catch (error) {
            console.error('Auth error:', error);
            OpsTrack.ui.showToast('❌ Ralat log masuk', 'error');
          }
        },
        async logout() {
          if (OpsTrackState.trackingActive) OpsTrack.tracking.stop();
          await signOut(auth);
          OpsTrackState.user = null;
          OpsTrackState.role = null;
          localStorage.removeItem('opsTrackRole');
          OpsTrack.ui.showLogin();
        }
      },

      // 🗺️ MAP MODULE (LEAFLET VERSION)
      map: {
        init(containerId = 'map') {
          try {
            if (OpsTrackState.map) OpsTrackState.map.remove();

            OpsTrackState.map = L.map(containerId, {
              center: OpsTrackConfig.map.defaultCenter,
              zoom: OpsTrackConfig.map.defaultZoom,
              zoomControl: false // We'll add it manually
            });

            L.tileLayer(OpsTrackConfig.map.tileLayer, {
              attribution: OpsTrackConfig.map.attribution,
              maxZoom: 19,
              crossOrigin: true            }).addTo(OpsTrackState.map);

            // Add Zoom Control top-right
            L.control.zoom({ position: 'topright' }).addTo(OpsTrackState.map);

            // Add Geolocation Control
            L.control.locate({
              position: 'topright',
              drawCircle: true,
              drawMarker: true,
              keepCurrentZoomLevel: true,
              markerStyle: { weight: 2, opacity: 1, fillOpacity: 0.5, color: '#1a73e8', fillColor: '#1a73e8' },
              circleStyle: { color: '#1a73e8', fillColor: '#1a73e8', fillOpacity: 0.2 }
            }).addTo(OpsTrackState.map);

            return OpsTrackState.map;
          } catch (error) {
            console.error('Map init error:', error);
            OpsTrack.ui.showToast('❌ Ralat memuatkan peta', 'error');
            return null;
          }
        },

        updateOperatorMarker(operatorId, data) {
          try {
            const { lat, lng } = data.location || {};
            if (!lat || !lng) return;

            const status = data.status || 'idle';
            const colors = { moving: '#34a853', stationary: '#f9ab00', idle: '#5f6368', emergency: '#ea4335' };
            const color = colors[status] || '#1a73e8';
            const isActive = OpsTrackState.user?.uid === operatorId;

            if (!OpsTrackState.markers.has(operatorId)) {
              const marker = L.circleMarker([lat, lng], {
                radius: isActive ? 10 : 8,
                fillColor: color,
                color: '#ffffff',
                weight: isActive ? 3 : 2,
                opacity: 1,
                fillOpacity: 0.9
              }).addTo(OpsTrackState.map);

              marker.bindPopup(OpsTrack.ui.getOperatorPopupHTML(data));
              
              // Click to follow
              marker.on('click', () => {
                OpsTrackState.map.flyTo([lat, lng], 15, { duration: 1.5 });
              });
              OpsTrackState.markers.set(operatorId, marker);
            } else {
              const marker = OpsTrackState.markers.get(operatorId);
              marker.setLatLng([lat, lng]);
              marker.setStyle({ 
                fillColor: color, 
                radius: isActive ? 10 : 8,
                weight: isActive ? 3 : 2
              });
              marker.setPopupContent(OpsTrack.ui.getOperatorPopupHTML(data));
            }

            if (isActive && OpsTrackState.trackingActive) {
              OpsTrackState.map.flyTo([lat, lng], Math.max(OpsTrackState.map.getZoom(), 15), { duration: 1 });
            }
          } catch (error) {
            console.error('Marker update error:', error);
          }
        },

        updateRoute(coordinates, status = 'active') {
          try {
            if (!coordinates?.length) return;
            
            const colors = { emergency: '#ea4335', completed: '#34a853', active: '#1a73e8' };
            const color = colors[status] || '#1a73e8';

            // Convert [lng, lat] to [lat, lng] for Leaflet
            const leafletCoords = coordinates.map(c => [c[1], c[0]]);

            if (OpsTrackState.polyline) {
              OpsTrackState.map.removeLayer(OpsTrackState.polyline);
            }

            OpsTrackState.polyline = L.polyline(leafletCoords, {
              color: color,
              weight: 5,
              opacity: 0.8,
              lineCap: 'round',
              lineJoin: 'round'
            }).addTo(OpsTrackState.map);

          } catch (error) {
            console.error('Route update error:', error);
          }
        },

        clearRoute() {
          if (OpsTrackState.polyline) {
            OpsTrackState.map.removeLayer(OpsTrackState.polyline);            OpsTrackState.polyline = null;
          }
        }
      },

      data: {
        startListeners() {
          try {
            if (OpsTrackState.role === 'admin') {
              const operatorsRef = ref(db, 'operators');
              onValue(operatorsRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                OpsTrackState.operators.clear();
                Object.entries(data).forEach(([id, op]) => {
                  OpsTrackState.operators.set(id, op);
                  if (op.location?.lat && op.location?.lng) {
                    OpsTrack.map.updateOperatorMarker(id, op);
                  }
                });
                OpsTrack.ui.updateOperatorList();
              });
            }

            if (OpsTrackState.user) {
              const myRef = ref(db, `operators/${OpsTrackState.user.uid}`);
              onValue(myRef, (snapshot) => {
                const data = snapshot.val();
                if (data?.activeMission) OpsTrack.data.listenToMission(data.activeMission);
              });
            }
          } catch (error) {
            console.error('Listener error:', error);
          }
        },

        listenToMission(missionId) {
          const missionRef = ref(db, `missions/${missionId}`);
          onValue(missionRef, (snapshot) => {
            const mission = snapshot.val();
            if (!mission) return;
            OpsTrackState.activeMission = mission;
            if (OpsTrackState.role === 'operator') {
              OpsTrack.ui.updateMissionPanel(mission);
            }
          });
        },

        async updateLocation(locationData) {
          if (!OpsTrackState.user?.uid) return false;          const updates = {
            [`operators/${OpsTrackState.user.uid}/location`]: locationData,
            [`operators/${OpsTrackState.user.uid}/lastSeen`]: Date.now(),
            [`operators/${OpsTrackState.user.uid}/status`]: locationData.speed > 0.5 ? 'moving' : 'stationary'
          };
          if (OpsTrackState.activeMission?.id) {
            updates[`missions/${OpsTrackState.activeMission.id}/currentLocation`] = {
              lat: locationData.lat, lng: locationData.lng, timestamp: locationData.timestamp
            };
          }
          try {
            await update(ref(db), updates);
            OpsTrackState.lastKnownPosition = locationData;
            return true;
          } catch (error) {
            OpsTrack.data.queueOffline({ type: 'location', data: locationData });
            return false;
          }
        },

        async sendEmergencyAlert(locationData) {
          if (!locationData) return;
          await push(ref(db, 'alerts'), {
            operatorId: OpsTrackState.user.uid,
            location: locationData,
            timestamp: Date.now(),
            acknowledged: false
          });
          await update(ref(db, `operators/${OpsTrackState.user.uid}`), { status: 'emergency' });
        },

        queueOffline(item) {
          OpsTrackState.offlineQueue.push({ ...item, queuedAt: Date.now() });
          if (OpsTrackState.offlineQueue.length > OpsTrackConfig.tracking.offlineQueueLimit) OpsTrackState.offlineQueue.shift();
          localStorage.setItem('opsTrackOfflineQueue', JSON.stringify(OpsTrackState.offlineQueue));
          OpsTrack.ui.showToast('📦 Data disimpan (Offline)', 'info');
        },

        async syncOfflineQueue() {
          if (OpsTrackState.offlineQueue.length === 0) return;
          const queue = [...OpsTrackState.offlineQueue];
          OpsTrackState.offlineQueue = [];
          for (const item of queue) {
            if (item.type === 'location') await OpsTrack.data.updateLocation(item.data);
          }
          localStorage.setItem('opsTrackOfflineQueue', JSON.stringify(OpsTrackState.offlineQueue));
          if (OpsTrackState.offlineQueue.length === 0) OpsTrack.ui.showToast('✅ Data disync!', 'success');
        }
      },
      tracking: {
        start() {
          if (!navigator.geolocation) { OpsTrack.ui.showToast('GPS tidak disokong', 'error'); return; }
          if (OpsTrackState.watchId) navigator.geolocation.clearWatch(OpsTrackState.watchId);
          
          OpsTrackState.watchId = navigator.geolocation.watchPosition(
            (pos) => OpsTrack.tracking.onSuccess(pos),
            (err) => OpsTrack.tracking.onError(err),
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
          );
          OpsTrackState.trackingActive = true;
          OpsTrack.ui.showToast('🛰️ Tracking ON', 'success');
          OpsTrack.ui.updateTrackingUI(true);
        },
        stop() {
          if (OpsTrackState.watchId) navigator.geolocation.clearWatch(OpsTrackState.watchId);
          OpsTrackState.trackingActive = false;
          OpsTrack.ui.showToast('⏹ Tracking OFF', 'info');
          OpsTrack.ui.updateTrackingUI(false);
        },
        onSuccess(pos) {
          const { latitude, longitude, accuracy, speed } = pos.coords;
          if (accuracy > OpsTrackConfig.tracking.accuracyThreshold) return;

          const loc = {
            lat: latitude, lng: longitude,
            accuracy: Math.round(accuracy),
            speed: speed ? Math.round(speed * 3.6 * 10) / 10 : 0,
            timestamp: Date.now()
          };

          const last = OpsTrackState.lastKnownPosition?.timestamp || 0;
          const freq = speed > 0.5 ? OpsTrackConfig.tracking.adaptiveFrequency.moving : OpsTrackConfig.tracking.adaptiveFrequency.stationary;

          if (Date.now() - last >= freq) {
            OpsTrack.data.updateLocation(loc);
            OpsTrack.map.updateRoute([[loc.lng, loc.lat]], OpsTrackState.activeMission?.status || 'active');
          }
          OpsTrack.ui.updateLocationDisplay(loc);
        },
        onError(err) {
          const msgs = { 1: 'Akses ditolak', 2: 'Lokasi tiada', 3: 'Timeout' };
          OpsTrack.ui.showToast(`⚠️ ${msgs[err.code] || 'Error GPS'}`, 'warning');
        }
      },

      ui: {
        init() {
          this.bindEvents();
          this.setupTheme();          window.addEventListener('online', () => { OpsTrackState.isOnline = true; this.updateOnlineIndicator(true); OpsTrack.data.syncOfflineQueue(); });
          window.addEventListener('offline', () => { OpsTrackState.isOnline = false; this.updateOnlineIndicator(false); });
          this.updateOnlineIndicator(OpsTrackState.isOnline);
          
          // Load offline queue
          const saved = localStorage.getItem('opsTrackOfflineQueue');
          if (saved) OpsTrackState.offlineQueue = JSON.parse(saved);
        },
        bindEvents() {
          document.getElementById('btn-login-demo')?.addEventListener('click', () => OpsTrack.auth.init());
          document.getElementById('btn-logout')?.addEventListener('click', () => OpsTrack.auth.logout());
          document.getElementById('btn-start-tracking')?.addEventListener('click', () => OpsTrack.tracking.start());
          document.getElementById('btn-stop-tracking')?.addEventListener('click', () => OpsTrack.tracking.stop());
          document.getElementById('btn-sos')?.addEventListener('click', () => {
            if(confirm('Hantar SOS?')) {
              OpsTrack.data.sendEmergencyAlert(OpsTrackState.lastKnownPosition);
              this.showToast('🚨 SOS DIHANTAR!', 'emergency');
            }
          });
          document.querySelectorAll('[data-checkin]').forEach(btn => {
            btn.addEventListener('click', (e) => {
              const type = e.target.dataset.checkin;
              if(OpsTrackState.lastKnownPosition) {
                OpsTrack.data.updateLocation({ ...OpsTrackState.lastKnownPosition, checkIn: type });
                this.showToast(`✓ ${type}`, 'success');
              }
            });
          });
          document.getElementById('theme-toggle')?.addEventListener('change', (e) => {
            localStorage.setItem('opsTrackTheme', e.target.value);
            this.setupTheme();
          });
          document.getElementById('role-toggle')?.addEventListener('change', (e) => {
            OpsTrackState.role = e.target.value;
            localStorage.setItem('opsTrackRole', OpsTrackState.role);
            this.renderDashboard();
          });
        },
        setupTheme() {
          const t = localStorage.getItem('opsTrackTheme') || 'auto';
          const theme = t === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t;
          document.documentElement.setAttribute('data-theme', theme);
          if(document.getElementById('theme-toggle')) document.getElementById('theme-toggle').value = t;
        },
        showLogin() { document.getElementById('auth-screen').classList.remove('hidden'); document.getElementById('dashboard-screen').classList.add('hidden'); },
        showDashboard() {
          document.getElementById('auth-screen').classList.add('hidden');
          document.getElementById('dashboard-screen').classList.remove('hidden');
          if (!OpsTrackState.map && document.getElementById('map')) OpsTrack.map.init('map');
          this.renderDashboard();        },
        renderDashboard() {
          const role = OpsTrackState.role || localStorage.getItem('opsTrackRole') || 'operator';
          document.body.setAttribute('data-role', role);
          document.querySelectorAll('[data-role]').forEach(el => {
            el.classList.toggle('hidden', el.dataset.role !== role && el.dataset.role !== 'all');
          });
          document.getElementById('role-indicator').textContent = role === 'admin' ? '👁️ Admin' : '👤 Operator';
        },
        getOperatorPopupHTML(data) {
          const loc = data.location || {};
          return `<div style="min-width:150px"><strong>${data.name||'Operator'}</strong><br><small>${data.vehicle||''}</small><hr style="margin:4px 0;border:0;border-top:1px solid #ddd"><div>Status: <b>${data.status}</b></div><div>Speed: ${loc.speed||0} km/j</div></div>`;
        },
        updateLocationDisplay(loc) {
          const el = document.getElementById('location-display');
          if(!el || !loc) return;
          el.innerHTML = `<div style="font-family:monospace;font-size:0.8rem">📍 ${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}</div><div style="font-size:0.8rem;color:#666">🎯 ${loc.accuracy}m ${loc.speed>0?'• 🚀 '+loc.speed+'km/j':''}</div>`;
        },
        updateMissionPanel(m) {
          const p = document.getElementById('mission-panel');
          if(!p || !m) return;
          p.innerHTML = `<div class="card mission-card"><h4>${m.title}</h4><div class="progress-bar mt-sm"><div class="progress-fill" style="width:${m.progress}%"></div></div><small>${m.progress}% Selesai</small></div>`;
        },
        updateOperatorList() {
          const list = document.getElementById('operator-list');
          if(!list) return;
          const ops = Array.from(OpsTrackState.operators.values());
          list.innerHTML = ops.slice(0, 50).map(op => `<div class="operator-list-item" onclick="OpsTrackState.map.flyTo([${op.location?.lat},${op.location?.lng}],15)"><span class="status-dot ${op.status}"></span><strong>${op.name||'Unknown'}</strong> <small>${op.status}</small></div>`).join('');
        },
        updateTrackingUI(active) {
          const s = document.getElementById('btn-start-tracking'), st = document.getElementById('btn-stop-tracking');
          if(s) s.disabled = active; if(st) st.disabled = !active;
        },
        updateOnlineIndicator(on) {
          const el = document.getElementById('online-indicator');
          if(el) el.className = `online-indicator ${on?'online':'offline'}`;
        },
        showToast(msg, type='info') {
          const c = document.getElementById('toast-container');
          if(!c) return;
          const t = document.createElement('div');
          t.className = `toast toast-${type}`;
          t.innerHTML = `<span>${msg}</span><button onclick="this.parentElement.remove()" style="background:none;border:none;color:white;cursor:pointer;margin-left:10px">×</button>`;
          c.appendChild(t);
          setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 4000);
        }
      }
    };

    document.addEventListener('DOMContentLoaded', () => { OpsTrack.ui.init(); OpsTrack.auth.init(); });    
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      window.OpsTrack = OpsTrack; window.OpsTrackState = OpsTrackState;
    }
  </script>

  <!-- 🎨 CSS (Sama seperti sebelumnya, ringkas untuk demo) -->
  <style>
    :root { --color-primary:#1a73e8; --color-success:#34a853; --color-warning:#f9ab00; --color-error:#ea4335; --color-emergency:#d93025; --color-bg:#fff; --color-text:#202124; --color-border:#dadce0; --shadow:0 2px 8px rgba(0,0,0,0.15); }
    [data-theme="dark"] { --color-bg:#1a1a1a; --color-text:#e8eaed; --color-border:#3c4043; }
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:system-ui,sans-serif;background:var(--color-bg);color:var(--color-text);height:100vh;display:flex;flex-direction:column}
    .hidden{display:none!important} .flex{display:flex} .gap-sm{gap:0.5rem} .items-center{align-items:center}
    #app{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .screen{flex:1;position:relative;display:none} .screen.active{display:flex;flex-direction:column}
    .header{padding:1rem;display:flex;justify-content:space-between;align-items:center;background:var(--color-bg);border-bottom:1px solid var(--color-border);z-index:1000}
    #map{flex:1;width:100%;z-index:1}
    .panel{position:absolute;background:var(--color-bg);padding:1rem;border-radius:8px;box-shadow:var(--shadow);z-index:1000;max-width:300px;width:90%}
    .bottom-left{bottom:1rem;left:1rem} .bottom-right{bottom:1rem;right:1rem} .top-right{top:1rem;right:1rem}
    .btn{padding:0.5rem 1rem;border:none;border-radius:4px;background:var(--color-primary);color:white;cursor:pointer;font-weight:500}
    .btn:disabled{opacity:0.5;cursor:not-allowed} .btn-success{background:var(--color-success)} .btn-warning{background:var(--color-warning);color:#202124}
    .btn-emergency{background:var(--color-emergency);animation:pulse 2s infinite}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(217,48,37,0.7)}70%{box-shadow:0 0 0 10px rgba(217,48,37,0)}}
    #toast-container{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:0.5rem}
    .toast{padding:0.8rem 1.2rem;background:#333;color:white;border-radius:4px;box-shadow:var(--shadow);opacity:1;transition:opacity 0.3s}
    .toast-success{background:var(--color-success)} .toast-error{background:var(--color-error)} .toast-warning{background:var(--color-warning);color:#202124} .toast-emergency{background:var(--color-emergency)}
    .card{background:var(--color-bg);border:1px solid var(--color-border);padding:0.8rem;border-radius:6px;margin-bottom:0.5rem}
    .mission-card{border-left:4px solid var(--color-primary)}
    .progress-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden} .progress-fill{height:100%;background:var(--color-success)}
    .operator-list-item{display:flex;align-items:center;gap:0.5rem;padding:0.5rem;border-bottom:1px solid var(--color-border);cursor:pointer}
    .operator-list-item:hover{background:rgba(0,0,0,0.05)}
    .status-dot{width:10px;height:10px;border-radius:50%} .status-dot.moving{background:var(--color-success)} .status-dot.stationary{background:var(--color-warning)} .status-dot.idle{background:#999} .status-dot.emergency{background:var(--color-emergency)}
    .online-indicator{width:10px;height:10px;border-radius:50%;background:red} .online-indicator.online{background:green}
    @media(max-width:768px){.panel{width:calc(100%-2rem)}}
  </style>
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <div class="panel" style="top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
        <h2>🛰️ OpsTrack</h2>
        <p style="margin:1rem 0;color:#666">Sistem Penjejakan (Leaflet Free)</p>
        <select id="role-toggle" style="width:100%;padding:0.5rem;margin-bottom:1rem">
          <option value="operator">👤 Operator</option>
          <option value="admin">👁️ Admin</option>
        </select>
        <button id="btn-login-demo" class="btn" style="width:100%">Mula Sistem</button>
      </div>
    </div>
    <!-- Dashboard -->
    <div id="dashboard-screen" class="screen">
      <header class="header">
        <strong>OpsTrack</strong>
        <div class="flex items-center gap-sm">
          <div id="online-indicator" class="online-indicator"></div>
          <span id="role-indicator" style="font-size:0.8rem">👤 Operator</span>
          <select id="theme-toggle" style="padding:0.2rem"><option value="light">☀️</option><option value="dark">🌙</option></select>
          <button id="btn-logout" class="btn btn-warning" style="padding:0.2rem 0.5rem;font-size:0.8rem">Keluar</button>
        </div>
      </header>

      <div id="map"></div>

      <!-- Operator Panel -->
      <div class="panel bottom-left" data-role="operator">
        <div id="location-display" style="margin-bottom:0.5rem;font-size:0.9rem"></div>
        <div class="flex gap-sm" style="margin-bottom:0.5rem">
          <button id="btn-start-tracking" class="btn btn-success" style="flex:1">Start</button>
          <button id="btn-stop-tracking" class="btn btn-warning" style="flex:1" disabled>Stop</button>
        </div>
        <div id="mission-panel"></div>
        <div class="flex gap-sm" style="margin-top:0.5rem">
          <button data-checkin="start" class="btn" style="flex:1;font-size:0.8rem">🚀</button>
          <button data-checkin="checkpoint" class="btn" style="flex:1;font-size:0.8rem">✅</button>
          <button data-checkin="complete" class="btn" style="flex:1;font-size:0.8rem">🏁</button>
        </div>
      </div>

      <!-- Admin Panel -->
      <div class="panel top-right" data-role="admin">
        <h4 style="margin-bottom:0.5rem">👥 Operator Aktif</h4>
        <div id="operator-list" style="max-height:200px;overflow-y:auto"></div>
        <div id="admin-mission-panel" style="margin-top:1rem"></div>
      </div>

      <!-- SOS -->
      <div class="panel bottom-right" data-role="all">
        <button id="btn-sos" class="btn btn-emergency" style="width:100%;padding:1rem">🚨 SOS</button>
      </div>
    </div>

    <div id="toast-container"></div>
  </div>
</body>
</html>
