<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpsTrack • Offline Mode</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}
    .hidden{display:none!important}
    
    /* Login */
    #login{display:flex;align-items:center;justify-content:center;height:100vh;
      background:linear-gradient(135deg,#1a73e8,#0d47a1)}
    .login-box{background:white;padding:2rem;border-radius:16px;text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.3);max-width:380px;width:90%}
    .login-box h1{color:#1a73e8;margin-bottom:0.5rem}
    .login-box p{color:#666;margin-bottom:1.5rem}
    
    /* Header */
    header{display:flex;justify-content:space-between;align-items:center;
      padding:0.75rem 1rem;background:#f8f9fa;border-bottom:1px solid #dadce0}
    .logo{font-size:1.25rem;font-weight:700;color:#1a73e8}
    
    /* Map */
    #map{flex:1;width:100%}
    
    /* Panel */
    .panel{position:absolute;background:white;padding:1rem;border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:1000;max-width:300px;width:calc(100%-2rem)}
    .bottom-left{bottom:1rem;left:1rem}
    .bottom-right{bottom:1rem;right:1rem}
    
    /* Buttons */
    .btn{padding:0.6rem 1.2rem;border:none;border-radius:8px;background:#1a73e8;
      color:white;font-weight:600;cursor:pointer;font-size:0.9rem}
    .btn:hover{opacity:0.9}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .btn-success{background:#34a853}
    .btn-warning{background:#f9ab00;color:#202124}
    .btn-emergency{background:#d93025;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,48,37,0.7)}50%{box-shadow:0 0 0 10px rgba(217,48,37,0)}}
    .btn-sm{padding:0.4rem 0.8rem;font-size:0.8rem}
    .btn-block{width:100%}
    
    /* Location */
    #loc{font-family:monospace;font-size:0.8rem;background:#f0f0f0;padding:0.5rem;
      border-radius:6px;margin-bottom:0.75rem}    
    /* Toast */
    #toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
      z-index:2000}
    .toast{padding:0.75rem 1.5rem;border-radius:8px;color:white;font-weight:500;
      margin-bottom:0.5rem;animation:slideUp 0.3s}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .toast-success{background:#34a853}
    .toast-error{background:#ea4335}
    .toast-warning{background:#f9ab00;color:#202124}
    .toast-emergency{background:#d93025}
    
    /* Checkin */
    .checkin{display:grid;grid-template-columns:repeat(4,1fr);gap:0.3rem;margin-top:0.75rem}
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login">
    <div class="login-box">
      <h1>🛰️ OpsTrack</h1>
      <p>Sistem Penjejakan Operator</p>
      <button class="btn btn-block" onclick="startApp()" style="padding:1rem;font-size:1rem">
        🚀 MULA SEKARANG
      </button>
      <p style="margin-top:1rem;font-size:0.8rem;color:#999">
        ✅ 100% Percuma • Tanpa Setup • GPS Real
      </p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <header>
      <div class="logo">🛰️ OpsTrack</div>
      <button class="btn btn-sm btn-warning" onclick="location.reload()">🚪 Keluar</button>
    </header>
    <div id="map"></div>
    
    <div class="panel bottom-left">
      <h4>📍 Lokasi Anda</h4>
      <div id="loc">Menunggu GPS...</div>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem">
        <button id="btn-start" class="btn btn-success btn-sm" style="flex:1" onclick="startTrack()">▶ Start</button>
        <button id="btn-stop" class="btn btn-warning btn-sm" style="flex:1" onclick="stopTrack()" disabled>⏹ Stop</button>
      </div>
      <div style="background:#f8f9fa;padding:0.75rem;border-radius:8px;border:1px solid #dadce0">
        <h4 style="font-size:0.85rem;margin-bottom:0.5rem">🎯 Misi</h4>
        <p style="font-size:0.8rem;color:#666;margin-bottom:0.5rem">Delivery KLCC → Bangsar</p>        <div style="height:6px;background:#dadce0;border-radius:3px;overflow:hidden;margin:0.5rem 0">
          <div id="progress" style="height:100%;width:35%;background:#34a853"></div>
        </div>
        <small style="color:#666">35% Selesai</small>
      </div>
      <div class="checkin">
        <button class="btn btn-sm" onclick="checkin('🚀 Mula')">🚀</button>
        <button class="btn btn-sm" onclick="checkin('✅ Checkpoint')">✅</button>
        <button class="btn btn-sm" onclick="checkin('☕ Rehat')">☕</button>
        <button class="btn btn-sm" onclick="checkin('🏁 Selesai')">🏁</button>
      </div>
    </div>
    
    <div class="panel bottom-right">
      <button class="btn btn-emergency btn-block" onclick="sos()" style="padding:1rem">
        🚨 SOS KECEMASAN
      </button>
      <p style="margin-top:0.5rem;font-size:0.7rem;color:#666;text-align:center">
        Tekan untuk hantar alert
      </p>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    let map,marker,polyline,route=[],watchId,tracking=false;

    function startApp(){
      document.getElementById('login').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      initMap();
      toast('✅ Selamat datang!','success');
    }

    function initMap(){
      map=L.map('map').setView([3.1390,101.6869],11);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© OpenStreetMap',maxZoom:19
      }).addTo(map);
    }

    function startTrack(){
      if(!navigator.geolocation)return toast('❌ GPS tidak disokong','error');
      watchId=navigator.geolocation.watchPosition(
        p=>{
          const{latitude:lat,longitude:lng,accuracy:acc,speed}=p.coords;
          const spd=speed?Math.round(speed*3.6*10)/10:0;
          document.getElementById('loc').innerHTML=`📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}<br>🎯 ${acc}m ${spd>0?'• 🚀 '+spd+' km/j':''}`;
                    if(!marker){
            marker=L.circleMarker([lat,lng],{radius:10,fillColor:'#1a73e8',color:'#fff',weight:3}).addTo(map);
            marker.bindPopup('<b>Anda</b>').openPopup();
          }else{
            marker.setLatLng([lat,lng]);
          }
          
          route.push([lng,lat]);
          if(route.length>500)route.shift();
          if(polyline)map.removeLayer(polyline);
          if(route.length>1){
            polyline=L.polyline(route.map(p=>[p[1],p[0]]),{color:'#1a73e8',weight:4}).addTo(map);
          }
          map.flyTo([lat,lng],15,{duration:0.5});
        },
        e=>toast('⚠️ GPS: '+e.message,'warning'),
        {enableHighAccuracy:true,timeout:10000,maximumAge:0}
      );
      tracking=true;
      document.getElementById('btn-start').disabled=true;
      document.getElementById('btn-stop').disabled=false;
      toast('🛰️ Tracking ON','success');
    }

    function stopTrack(){
      if(watchId)navigator.geolocation.clearWatch(watchId);
      tracking=false;
      document.getElementById('btn-start').disabled=false;
      document.getElementById('btn-stop').disabled=true;
      toast('⏹ Tracking OFF','info');
    }

    function checkin(msg){toast(msg,'success');
      const p=document.getElementById('progress');
      p.style.width=Math.min(100,parseInt(p.style.width)+15)+'%';
    }

    function sos(){if(confirm('🚨 Hantar SOS?'))toast('🚨 SOS DIHANTAR!','emergency');}

    function toast(msg,type='info'){
      const t=document.createElement('div');
      t.className='toast toast-'+type;
      t.textContent=msg;
      document.getElementById('toast').appendChild(t);
      setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},4000);
    }
  </script>
</body>
</html>
