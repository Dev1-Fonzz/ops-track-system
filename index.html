<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamilyTrack • Debug Version</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;height:100vh;overflow:hidden}
    .hidden{display:none!important}
    #login{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1a73e8,#0d47a1)}
    .login-box{background:white;padding:2rem;border-radius:16px;text-align:center;max-width:400px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .login-box h1{color:#1a73e8;margin-bottom:0.5rem}
    .role-btn{width:100%;padding:1rem;margin:0.5rem 0;border:2px solid #dadce0;border-radius:12px;background:white;cursor:pointer}
    .role-btn.selected{border-color:#1a73e8;background:#e8f0fe}
    .btn{padding:0.6rem 1.2rem;border:none;border-radius:8px;background:#1a73e8;color:white;font-weight:600;cursor:pointer;width:100%;margin-top:1rem}
    .btn-success{background:#34a853}
    .btn-warning{background:#f9ab00;color:#202124}
    .btn-emergency{background:#d93025;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,48,37,0.7)}50%{box-shadow:0 0 0 10px rgba(217,48,37,0)}}
    #map{height:calc(100vh - 60px);width:100%}
    header{display:flex;justify-content:space-between;padding:0.75rem 1rem;background:#f8f9fa;border-bottom:1px solid #dadce0}
    .panel{position:absolute;background:white;padding:1rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:1000;max-width:320px;width:calc(100%-2rem)}
    .bottom-left{bottom:1rem;left:1rem}
    .top-right{top:1rem;right:1rem}
    .user-list{max-height:300px;overflow-y:auto}
    .user-item{display:flex;align-items:center;gap:0.5rem;padding:0.5rem;margin:0.25rem 0;background:#f8f9fa;border-radius:8px;cursor:pointer}
    .user-item:hover{background:#e8f0fe}
    .status-dot{width:10px;height:10px;border-radius:50%}
    .status-dot.online{background:#34a853}
    .status-dot.offline{background:#999}
    .status-dot.emergency{background:#d93025;animation:pulse 1s infinite}
    #loc{font-family:monospace;font-size:0.8rem;background:#f0f0f0;padding:0.5rem;border-radius:6px;margin:0.5rem 0}
    #toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:2000}
    .toast{padding:0.75rem 1.5rem;border-radius:8px;color:white;margin-bottom:0.5rem}
    .toast-success{background:#34a853}
    .toast-error{background:#ea4335}
    .toast-info{background:#1a73e8}
    .toast-emergency{background:#d93025}
  </style>
</head>
<body>

  <div id="login">
    <div class="login-box">
      <h1>👨‍👩‍👧‍👦 FamilyTrack</h1>
      <p style="color:#666;margin:1rem 0">Pemantauan Lokasi Keluarga</p>
            <div class="role-btn selected" onclick="selectRole('user',this)">
        📍 <strong>Ahli Keluarga</strong><br><small>Share lokasi saya</small>
      </div>
      <div class="role-btn" onclick="selectRole('operator',this)">
        👁️ <strong>Pemantau</strong><br><small>Lihat semua lokasi</small>
      </div>
      
      <button class="btn" onclick="login()">🚀 MULA</button>
      <p id="debug-status" style="margin-top:1rem;font-size:0.75rem;color:#999"></p>
    </div>
  </div>

  <div id="dashboard" class="hidden">
    <header>
      <strong>👨‍👩‍👧‍👦 FamilyTrack</strong>
      <button class="btn btn-warning" style="width:auto;padding:0.4rem 0.8rem" onclick="logout()">🚪 Keluar</button>
    </header>
    <div id="map"></div>
    
    <div class="panel bottom-left hidden" id="user-panel">
      <h4>📍 Lokasi Anda</h4>
      <div id="loc">Menunggu GPS...</div>
      <button class="btn btn-success" onclick="startTrack()">▶ Share Lokasi</button>
      <button class="btn btn-warning" onclick="stopTrack()" disabled>⏹ Stop</button>
      <button class="btn btn-emergency" onclick="sendSOS()" style="margin-top:0.5rem">🚨 SOS</button>
    </div>
    
    <div class="panel top-right hidden" id="operator-panel">
      <h4>👥 Ahli Keluarga</h4>
      <div id="user-list" class="user-list"><small>Memuatkan...</small></div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, onDisconnect, push } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

    // 🔧 FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyABchyom-zF_ZWuV7HWiDLWBaopBQ1TYxk",
      authDomain: "ops-track-system.firebaseapp.com",
      databaseURL: "https://ops-track-system-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "ops-track-system",
      storageBucket: "ops-track-system.firebasestorage.app",
      messagingSenderId: "706189064777",
      appId: "1:706189064777:web:03f71ed77e5c3e1f265d98"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const state = { user: null, role: 'user', map: null, markers: new Map(), watchId: null, pos: null };
    window.selectRole = (role, el) => { state.role = role; document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected')); el.classList.add('selected'); };

    // 🔐 AUTH WITH DEBUG
    onAuthStateChanged(auth, async (user) => {
      console.log('🔐 Auth State:', user ? user.uid : 'No user');
      document.getElementById('debug-status').textContent = user ? `UID: ${user.uid.slice(0,8)}...` : 'Not logged in';
      
      if (user) {
        state.user = user;
        const name = state.role === 'operator' ? `Pemantau_${user.uid.slice(0,4)}` : `Ahli_${user.uid.slice(0,4)}`;
        
        try {
          await update(ref(db, `users/${user.uid}`), {
            name, role: state.role, isOnline: true, lastSeen: Date.now()
          });
          console.log('✅ User data written to Firebase');
        } catch (e) {
          console.error('❌ Failed to write user data:', e);
          toast('❌ Gagal tulis data: ' + e.message, 'error');
        }
        
        onDisconnect(ref(db, `users/${user.uid}/isOnline`)).set(false);
        showDashboard();
        initMap();
        
        if (state.role === 'user') {
          console.log('📡 Listening to own data...');
          onValue(ref(db, `users/${user.uid}`), (snap) => {
            const data = snap.val();
            console.log('📍 Own location update:', data?.location);
            if (data?.location?.lat && data?.location?.lng) {
              updateMarker(user.uid, data.location.lat, data.location.lng, data.status||'online', data.name||'Saya', true);
            }
          });
        } else {
          console.log('👁️ Listening to all users...');
          onValue(ref(db, 'users'), (snap) => {
            const data = snap.val();
            console.log('👥 All users:', data);
            if (!data) {
              document.getElementById('user-list').innerHTML = '<small>Tiada data</small>';
              return;
            }
            const list = document.getElementById('user-list');            list.innerHTML = '';
            Object.entries(data).forEach(([uid, u]) => {
              if (u.role !== 'user') return;
              if (u.location?.lat && u.location?.lng) {
                updateMarker(uid, u.location.lat, u.location.lng, u.isOnline?'online':'offline', u.name||'Unknown');
              }
              const item = document.createElement('div');
              item.className = 'user-item';
              item.innerHTML = `<span class="status-dot ${u.isOnline?'online':'offline'}"></span><div><strong>${u.name||'Unknown'}</strong><br><small>${u.location?'📍 Ada lokasi':'⏳ Tiada lokasi'}</small></div>`;
              item.onclick = () => { state.map.flyTo([u.location?.lat||3.139, u.location?.lng||101.6869], 15); };
              list.appendChild(item);
            });
          }, (e) => {
            console.error('❌ Error listening users:', e);
            toast('❌ Error: ' + e.message, 'error');
          });
        }
        toast('✅ Berjaya masuk', 'success');
      } else {
        document.getElementById('login').classList.remove('hidden');
        document.getElementById('dashboard').classList.add('hidden');
      }
    });

    window.login = async () => {
      console.log('🔐 Attempting login...');
      try {
        await signInAnonymously(auth);
        console.log('✅ Login successful');
      } catch (e) {
        console.error('❌ Login failed:', e);
        toast('❌ ' + (e.code==='auth/operation-not-allowed'?'Enable Anonymous Auth di Firebase!':e.message), 'error');
      }
    };

    window.logout = async () => {
      if (state.watchId) navigator.geolocation.clearWatch(state.watchId);
      await signOut(auth);
      location.reload();
    };

    function showDashboard() {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('user-panel').classList.toggle('hidden', state.role==='operator');
      document.getElementById('operator-panel').classList.toggle('hidden', state.role==='user');
    }

    function initMap() {
      state.map = L.map('map').setView([3.1390, 101.6869], 11);      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.map);
    }

    function updateMarker(uid, lat, lng, status, name, isSelf=false) {
      const colors = { online:'#34a853', offline:'#999', emergency:'#ea4335' };
      if (!state.markers.has(uid)) {
        const m = L.circleMarker([lat,lng], { radius:isSelf?12:8, fillColor:colors[status]||'#1a73e8', color:'#fff', weight:3 }).addTo(state.map);
        m.bindPopup(`<b>${name}</b><br>${status}`);
        state.markers.set(uid, m);
        console.log('📍 Marker created:', uid);
      } else {
        const m = state.markers.get(uid);
        m.setLatLng([lat,lng]);
        m.setStyle({ fillColor: colors[status]||'#1a73e8' });
        console.log('📍 Marker updated:', uid);
      }
    }

    async function updateLocation(lat, lng, acc, speed) {
      if (!state.user) return;
      state.pos = { lat, lng, acc, speed, ts: Date.now() };
      try {
        await update(ref(db, `users/${state.user.uid}`), {
          location: { lat, lng, accuracy: acc, speed, timestamp: Date.now() },
          status: speed > 0.5 ? 'moving' : 'online',
          lastSeen: Date.now()
        });
        console.log('✅ Location sent to Firebase:', lat, lng);
        document.getElementById('loc').innerHTML = `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}<br>🎯 ${acc}m`;
        updateMarker(state.user.uid, lat, lng, speed>0.5?'moving':'online', 'Saya', true);
      } catch (e) {
        console.error('❌ Failed to update location:', e);
        toast('❌ Gagal update lokasi: ' + e.message, 'error');
      }
    }

    window.startTrack = () => {
      if (!navigator.geolocation) return toast('❌ GPS tidak disokong', 'error');
      state.watchId = navigator.geolocation.watchPosition(
        p => updateLocation(p.coords.latitude, p.coords.longitude, Math.round(p.coords.accuracy), p.coords.speed?Math.round(p.coords.speed*3.6*10)/10:0),
        e => { console.warn('⚠️ GPS error:', e); toast('⚠️ GPS: '+e.message, 'warning'); },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
      document.querySelector('#user-panel .btn-success').disabled = true;
      document.querySelector('#user-panel .btn-warning').disabled = false;
      toast('📡 Lokasi dikongsi', 'success');
    };

    window.stopTrack = () => {
      if (state.watchId) navigator.geolocation.clearWatch(state.watchId);      document.querySelector('#user-panel .btn-success').disabled = false;
      document.querySelector('#user-panel .btn-warning').disabled = true;
      toast('⏹ Stop', 'info');
    };

    window.sendSOS = async () => {
      if (!confirm('🚨 Hantar SOS?')) return;
      await push(ref(db, 'alerts'), { userId: state.user.uid, location: state.pos, timestamp: Date.now() });
      await update(ref(db, `users/${state.user.uid}`), { status: 'emergency' });
      toast('🚨 SOS DIHANTAR!', 'emergency');
    };

    function toast(msg, type='info') {
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.textContent = msg;
      document.getElementById('toast').appendChild(t);
      setTimeout(()=>t.remove(), 4000);
    }
  </script>
</body>
</html>
